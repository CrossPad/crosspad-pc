name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TAG="${TAG#v}"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b472291f295551b7127359ea38fdd2ca092f6f1b'

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RUNVCPKG_VCPKG_ROOT }}/installed
          key: vcpkg-release-${{ runner.os }}-${{ hashFiles('**/vcpkgGitCommitId') }}-sdl2
          restore-keys: vcpkg-release-${{ runner.os }}-

      - name: Install SDL2
        run: ${{ env.VCPKG_ROOT }}/vcpkg install sdl2:x64-windows

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="${{ env.RUNVCPKG_VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          "-DCROSSPAD_VERSION_OVERRIDE=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/CrossPad
          cp bin/CrossPad.exe dist/CrossPad/CrossPad.exe
          # Copy SDL2.dll from vcpkg installed dir
          cp "$RUNVCPKG_VCPKG_ROOT/installed/x64-windows/bin/SDL2.dll" dist/CrossPad/
          # Copy assets
          cp -r crosspad-gui/assets dist/CrossPad/assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossPad-Windows-x64
          path: dist/CrossPad

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TAG="${TAG#v}"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-sdl2-ninja-alsa

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev ninja-build libasound2-dev

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DCROSSPAD_VERSION_OVERRIDE=${{ steps.version.outputs.version }}

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p dist/CrossPad
          cp bin/CrossPad dist/CrossPad/CrossPad
          chmod +x dist/CrossPad/CrossPad
          cp -r crosspad-gui/assets dist/CrossPad/assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossPad-Linux-x64
          path: dist/CrossPad

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CrossPad-Windows-x64
          path: CrossPad-Windows-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CrossPad-Linux-x64
          path: CrossPad-Linux-x64

      - name: Create archives
        run: |
          cd CrossPad-Windows-x64 && zip -r ../CrossPad-Windows-x64.zip . && cd ..
          tar -czf CrossPad-Linux-x64.tar.gz -C CrossPad-Linux-x64 .

      - name: Checkout (for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: repo
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Determine tag and stability
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "name=$TAG" >> $GITHUB_OUTPUT
          # Tags with a dash after version are pre-releases (v0.2.9-CR, v0.3.0-beta, etc.)
          VERSION="${TAG#v}"
          if echo "$VERSION" | grep -q '-'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          # Find previous tag
          PREV_TAG=$(git -C repo tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git -C repo log --pretty=format:"- %s" HEAD | head -30)
          else
            CHANGELOG=$(git -C repo log --pretty=format:"- %s" "${PREV_TAG}..${TAG}" 2>/dev/null || git -C repo log --pretty=format:"- %s" HEAD | head -30)
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "**Full Changelog**: https://github.com/CrossPad/crosspad-pc/compare/${PREV_TAG}...${TAG}"
          } > release_body.md
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: CrossPad PC ${{ steps.tag.outputs.name }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          files: |
            CrossPad-Windows-x64.zip
            CrossPad-Linux-x64.tar.gz

      - name: Detect release type
        id: release_type
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if echo "$TAG" | grep -qE '^(CR-)?v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "type=stable" >> $GITHUB_OUTPUT
            echo "label=✅ Stable" >> $GITHUB_OUTPUT
            echo "color=5814783" >> $GITHUB_OUTPUT
            echo "role_id=${{ vars.DISCORD_ROLE_STABLE }}" >> $GITHUB_OUTPUT
          else
            echo "type=nightly" >> $GITHUB_OUTPUT
            echo "label=🌙 Nightly" >> $GITHUB_OUTPUT
            echo "color=16750848" >> $GITHUB_OUTPUT
            echo "role_id=${{ vars.DISCORD_ROLE_NIGHTLY }}" >> $GITHUB_OUTPUT
          fi

      - name: Notify Discord
        if: success()
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}
          RELEASE_LABEL: ${{ steps.release_type.outputs.label }}
          RELEASE_COLOR: ${{ steps.release_type.outputs.color }}
          ROLE_ID: ${{ steps.release_type.outputs.role_id }}
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          MENTION=""
          if [ -n "$ROLE_ID" ]; then
            MENTION="<@&${ROLE_ID}>"
          fi
          PAYLOAD=$(jq -n \
            --arg content "$MENTION" \
            --arg title "CrossPad PC ${TAG_NAME} released!" \
            --arg url "https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}" \
            --argjson color "${RELEASE_COLOR}" \
            --arg label "$RELEASE_LABEL" \
            --arg role_id "$ROLE_ID" \
            '{
              content: $content,
              allowed_mentions: { roles: (if $role_id != "" then [$role_id] else [] end) },
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                fields: [
                  { name: "Type", value: $label, inline: true },
                  { name: "Platform", value: "Windows x64, Linux x64", inline: true }
                ]
              }]
            }')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TAG="${TAG#v}"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b472291f295551b7127359ea38fdd2ca092f6f1b'

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RUNVCPKG_VCPKG_ROOT }}/installed
          key: vcpkg-release-${{ runner.os }}-${{ hashFiles('**/vcpkgGitCommitId') }}-sdl2
          restore-keys: vcpkg-release-${{ runner.os }}-

      - name: Install SDL2
        run: ${{ env.VCPKG_ROOT }}/vcpkg install sdl2:x64-windows

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="${{ env.RUNVCPKG_VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DCROSSPAD_VERSION_OVERRIDE=${{ steps.version.outputs.version }}

      - name: Build
        run: cmake --build build

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/CrossPad
          cp bin/CrossPad.exe dist/CrossPad/CrossPad.exe
          # Copy SDL2.dll from vcpkg installed dir
          cp "$RUNVCPKG_VCPKG_ROOT/installed/x64-windows/bin/SDL2.dll" dist/CrossPad/
          # Copy assets
          cp -r crosspad-gui/assets dist/CrossPad/assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossPad-Windows-x64
          path: dist/CrossPad

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TAG="${TAG#v}"
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-sdl2-ninja-alsa

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev ninja-build libasound2-dev

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DCROSSPAD_VERSION_OVERRIDE=${{ steps.version.outputs.version }}

      - name: Build
        run: cmake --build build

      - name: Package
        run: |
          mkdir -p dist/CrossPad
          cp bin/CrossPad dist/CrossPad/CrossPad
          chmod +x dist/CrossPad/CrossPad
          cp -r crosspad-gui/assets dist/CrossPad/assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossPad-Linux-x64
          path: dist/CrossPad

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CrossPad-Windows-x64
          path: CrossPad-Windows-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CrossPad-Linux-x64
          path: CrossPad-Linux-x64

      - name: Create archives
        run: |
          cd CrossPad-Windows-x64 && zip -r ../CrossPad-Windows-x64.zip . && cd ..
          tar -czf CrossPad-Linux-x64.tar.gz -C CrossPad-Linux-x64 .

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: CrossPad ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          files: |
            CrossPad-Windows-x64.zip
            CrossPad-Linux-x64.tar.gz

name: CI

on:
  push:
    branches: [master]
    paths-ignore: ['**.md', 'docs/**', 'screenshots/**']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b472291f295551b7127359ea38fdd2ca092f6f1b'

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RUNVCPKG_VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkgGitCommitId') }}-sdl2
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install SDL2
        run: ${{ env.VCPKG_ROOT }}/vcpkg install sdl2:x64-windows

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'lib/crosspad-core', 'lib/crosspad-gui') }}
          restore-keys: cmake-build-${{ runner.os }}-

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_TOOLCHAIN_FILE="${{ env.RUNVCPKG_VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Test (unit + e2e, headless)
        run: ctest --test-dir build --output-on-failure -LE gui
